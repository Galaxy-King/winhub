<input name="name" placeholder="Name, e.g. 7-Zip" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
<div class="grid grid-cols-2 gap-3">
    <input name="version" placeholder="Version" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
    <input name="vendor" placeholder="Vendor" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
</div>
<div class="grid grid-cols-2 gap-3">
    <select name="package_type" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
        <option value="exe">EXE</option>
        <option value="msi">MSI</option>
        <option value="zip">ZIP</option>
        <option value="ps1">PS1</option>
        <option value="bat">BAT</option>
        <option value="custom">Custom</option>
    </select>
    <select name="architecture" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
        <option value="any">Any arch</option>
        <option value="x64">x64</option>
        <option value="x86">x86</option>
        <option value="arm64">ARM64</option>
    </select>
</div>
<input name="external_url" placeholder="External URL instead of upload" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
<input name="sha256" placeholder="SHA256 for external URL" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
<input name="file" type="file" class="w-full text-xs font-bold text-slate-500">
<textarea name="install_command" placeholder='All users install command, e.g. msiexec /i "{file}" /qn /norestart' class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 min-h-[110px]"></textarea>
<textarea name="user_install_command" placeholder='Specific users install command. Use {users} for selected logins.' class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 min-h-[110px]"></textarea>
<div class="grid grid-cols-2 gap-3">
    <select name="detection_type" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
        <option value="none">No detection</option>
        <option value="file_exists">File exists</option>
        <option value="folder_exists">Folder exists</option>
        <option value="registry_key_exists">Registry key exists</option>
        <option value="command">Command returns 0</option>
    </select>
    <input name="expected_exit_codes" value="0,3010" placeholder="Exit codes" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10">
</div>
<textarea name="detection_value" placeholder="Detection value/path/command" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 min-h-[72px]"></textarea>
<textarea name="uninstall_command" placeholder="Optional uninstall command" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-mono font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 min-h-[72px]"></textarea>
<textarea name="notes" placeholder="Notes..." class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl text-xs font-bold outline-none focus:ring-4 focus:ring-indigo-500/10 min-h-[72px]"></textarea>
